name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Build and Publish
        shell: pwsh
        run: |
          $v = $env:GITHUB_REF -replace 'refs/tags/v', ''
          if ($v -eq $env:GITHUB_REF) { $v = $env:GITHUB_REF -replace 'refs/tags/', '' }
          echo "Building version: $v"
          just publish "$v"

      - name: Prepare Assets
        shell: pwsh
        run: |
          $v = $env:GITHUB_REF -replace 'refs/tags/v', ''
          if ($v -eq $env:GITHUB_REF) { $v = $env:GITHUB_REF -replace 'refs/tags/', '' }
          Move-Item "publish/win-x64/docker-rep2-win-setup.exe" "docker-rep2-win-setup-$v-win-x64.exe"
          Move-Item "publish/win-arm64/docker-rep2-win-setup.exe" "docker-rep2-win-setup-$v-win-arm64.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            docker-rep2-win-setup-*-win-x64.exe
            docker-rep2-win-setup-*-win-arm64.exe
          draft: true
          generate_release_notes: true
